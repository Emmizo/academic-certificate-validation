<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::main})">
<head>
    <title>Secure Portal Login</title>
</head>
<body>
<main class="min-h-[calc(100vh-4rem)] bg-[#164655] flex items-center justify-center">
    <div class="w-full max-w-xl px-4">
        <div class="bg-white border border-slate-200 rounded-2xl px-6 py-8 sm:px-10 shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-semibold text-slate-900">Secure Portal Login</h1>
            <p class="mt-1 text-sm text-slate-600">
                Authorized university staff can sign in to manage keys and academic certificates.
            </p>

            <div class="mt-4" th:if="${param.error}">
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-800">
                    Invalid username or password.
                </div>
            </div>
            <div class="mt-4" th:if="${param.resetSuccess}">
                <div class="rounded-lg border border-green-200 bg-green-50 p-3 text-sm text-green-800">
                    Password reset successful. Please sign in.
                </div>
            </div>

            <form class="mt-6 space-y-4" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Username</label>
                    <input name="username" type="text" required
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1 relative">
                        <input id="login-password" name="password" type="password" required
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button"
                                id="toggle-password-visibility"
                                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600"
                                aria-label="Toggle password visibility">
                            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                    Sign In
                </button>
            </form>

            <p class="mt-3 text-sm text-right">
                <a th:href="@{/forgot-password}" class="text-[#164655] hover:underline font-semibold">
                    Forgot password?
                </a>
            </p>

            <div class="mt-6 border-t border-slate-200 pt-4 text-center text-xs sm:text-sm text-slate-600 space-y-2">
                <p>
                    <span class="font-semibold text-slate-800">Public verification portal:</span>
                    <a th:href="@{/verify}" class="ml-1 text-[#164655] hover:underline font-semibold">
                        Open verification
                    </a>
                </p>
                <p>
                    <a th:href="@{/}" class="text-slate-500 hover:text-slate-700 hover:underline">
                        ← Back to homepage
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const input = document.getElementById('login-password');
            const toggle = document.getElementById('toggle-password-visibility');
            if (!input || !toggle) return;

            toggle.addEventListener('click', function () {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
            });
        })();
    </script>
</main>
</body>
</html>
