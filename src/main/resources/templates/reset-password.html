<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::main})">
<head>
    <title>Reset Password | CertSign</title>
</head>
<body>
<main class="min-h-[calc(100vh-4rem)] bg-[#164655] flex items-center justify-center">
    <div class="w-full max-w-xl px-4">
        <div class="bg-white border border-slate-200 rounded-2xl px-6 py-8 sm:px-10 shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-semibold text-slate-900">Reset Password</h1>

            <div class="mt-4" th:if="${error}">
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-800" th:text="${error}">
                    Error
                </div>
            </div>

            <div class="mt-4" th:if="${!validToken}">
                <div class="rounded-lg border border-amber-200 bg-amber-50 p-3 text-sm text-amber-800">
                    This reset link is invalid or expired.
                </div>
                <p class="mt-4 text-sm">
                    <a th:href="@{/forgot-password}" class="text-[#164655] font-semibold hover:underline">
                        Request a new reset link
                    </a>
                </p>
            </div>

            <form th:if="${validToken}" class="mt-6 space-y-4" th:action="@{/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="token" th:value="${token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700">New Password</label>
                    <input name="password" type="password" minlength="8" required
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Confirm Password</label>
                    <input name="confirmPassword" type="password" minlength="8" required
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
