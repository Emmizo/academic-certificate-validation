<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Reset Password | IPRC Tumba College</title>
</head>
<body>
<main class="min-h-[calc(100vh-4rem)] bg-[#164655] flex items-center justify-center">
    <div class="w-full max-w-xl px-4">
        <div class="bg-white border border-slate-200 rounded-2xl px-6 py-8 sm:px-10 shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-semibold text-slate-900">Reset Password</h1>

            <div class="mt-4" th:if="${error}">
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-800" th:text="${error}">
                    Error
                </div>
            </div>

            <div class="mt-4" th:if="${!validToken}">
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-800">
                    This reset link is invalid or has expired. Reset links are only valid for <strong>1 minute</strong>.
                </div>
                <p class="mt-4 text-sm">
                    <a th:href="@{/forgot-password}" class="text-[#164655] font-semibold hover:underline">
                        Request a new reset link
                    </a>
                </p>
            </div>

            <form th:if="${validToken}" class="mt-6 space-y-4" th:action="@{/reset-password}" method="post">
                <div class="rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-800">
                    This link expires in <strong>1 minute</strong>. Submit your new password before it expires.
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="token" th:value="${token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700">New Password</label>
                    <div class="relative mt-1">
                        <input name="password" type="password" minlength="8" required
                               class="w-full rounded-lg border border-slate-300 pl-3 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors duration-150" onclick="togglePasswordVisibility(this)">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Confirm Password</label>
                    <div class="relative mt-1">
                        <input name="confirmPassword" type="password" minlength="8" required
                               class="w-full rounded-lg border border-slate-300 pl-3 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors duration-150" onclick="togglePasswordVisibility(this)">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                    Update Password
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(button) {
            const container = button.parentElement;
            const input = container.querySelector('input');
            const eyeIcon = button.querySelector('.eye-icon');
            const eyeOffIcon = button.querySelector('.eye-off-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
</main>
</body>
</html>
