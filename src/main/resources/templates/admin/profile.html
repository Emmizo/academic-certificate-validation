<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin-layout :: adminLayout(~{::title}, ~{::main})}">
<head>
    <title>Profile | CertSign Admin</title>
</head>
<body>
<main>
    <section class="max-w-3xl space-y-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">My Profile</h1>
            <p class="mt-1 text-sm text-slate-600">Your account details.</p>
        </div>

        <div th:if="${success}" class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800" th:text="${success}">
            Success message
        </div>
        <div th:if="${error}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800" th:text="${error}">
            Error message
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6">
            <dl class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <dt class="text-xs text-slate-500">Username</dt>
                    <dd class="mt-1 text-sm font-semibold text-slate-900" th:text="${currentUser.username}">admin</dd>
                </div>
                <div>
                    <dt class="text-xs text-slate-500">Full Name</dt>
                    <dd class="mt-1 text-sm font-semibold text-slate-900"
                        th:text="${(currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName)) ? currentUser.fullName : 'Not set'}">
                        Principal Officer
                    </dd>
                </div>
                <div>
                    <dt class="text-xs text-slate-500">Role</dt>
                    <dd class="mt-1 text-sm font-semibold text-slate-900" th:text="${currentUser.role}">ADMIN</dd>
                </div>
                <div>
                    <dt class="text-xs text-slate-500">Email</dt>
                    <dd class="mt-1 text-sm font-semibold text-slate-900"
                        th:text="${(currentUser.email != null and !#strings.isEmpty(currentUser.email)) ? currentUser.email : 'Not set'}">
                        admin@example.com
                    </dd>
                </div>
                <div>
                    <dt class="text-xs text-slate-500">Created At</dt>
                    <dd class="mt-1 text-sm font-semibold text-slate-900"
                        th:text="${#temporals.format(currentUser.createdAt, 'yyyy-MM-dd HH:mm:ss')}">
                        2026-01-01 12:00:00
                    </dd>
                </div>
            </dl>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6">
            <h2 class="text-lg font-semibold text-slate-900">Change Password</h2>
            <p class="text-xs text-slate-500 mt-1">Ensure your account is using a long, secure password.</p>

            <form th:action="@{/admin/profile/password}" method="post" class="mt-6 space-y-4 max-w-md">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600">Current Password</label>
                    <div class="relative mt-1">
                        <input type="password" name="currentPassword" required
                               class="w-full rounded-lg border border-slate-300 pl-3 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors duration-150" onclick="togglePasswordVisibility(this)">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600">New Password</label>
                    <div class="relative mt-1">
                        <input type="password" name="newPassword" required minlength="8"
                               class="w-full rounded-lg border border-slate-300 pl-3 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors duration-150" onclick="togglePasswordVisibility(this)">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600">Confirm New Password</label>
                    <div class="relative mt-1">
                        <input type="password" name="confirmPassword" required minlength="8"
                               class="w-full rounded-lg border border-slate-300 pl-3 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors duration-150" onclick="togglePasswordVisibility(this)">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit"
                        class="rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a] text-sm shadow">
                    Update Password
                </button>
            </form>
        </div>
    </section>

    <script>
        function togglePasswordVisibility(button) {
            const container = button.parentElement;
            const input = container.querySelector('input');
            const eyeIcon = button.querySelector('.eye-icon');
            const eyeOffIcon = button.querySelector('.eye-off-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
</main>
</body>
</html>
