<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin-layout :: adminLayout(~{::title}, ~{::main})">
<head>
    <title>Edit Certificate</title>
</head>
<body>
<main class="space-y-6">
    <div class="flex flex-wrap items-start justify-between gap-3 sm:gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Edit Certificate</h1>
            <p class="mt-1 text-sm text-slate-600">
                Update certificate details. Saving will regenerate the cryptographic hash and digital signature.
            </p>
        </div>
        <a th:href="@{/admin/certificates/{id}(id=${certificate.id})}"
           class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">
            Cancel
        </a>
    </div>

    <div th:if="${error}" class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800">
        <span th:text="${error}">There was a validation error.</span>
    </div>

    <form th:action="@{/admin/certificates/{id}/edit(id=${certificate.id})}"
          th:object="${certificateRequest}"
          method="post"
          class="mt-4 space-y-6">

        <div class="rounded-2xl border border-slate-200 bg-white p-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Student</label>
                <select th:field="*{studentRefId}"
                        class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-[#164655] focus:ring-[#164655]">
                    <option value="" disabled>Select a student</option>
                    <option th:each="s : ${students}"
                            th:value="${s.id}"
                            th:text="${s.fullName + ' (' + s.studentNumber + ')'}">
                    </option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Degree / Program</label>
                    <input th:field="*{degree}" type="text"
                           class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-[#164655] focus:ring-[#164655]"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Institution</label>
                    <input th:field="*{institution}" type="text"
                           class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-[#164655] focus:ring-[#164655]"/>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Issue Date</label>
                <input th:field="*{issueDate}" type="date"
                       class="mt-1 block w-full max-w-xs rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-[#164655] focus:ring-[#164655]"/>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit"
                    class="rounded-lg bg-[#164655] px-4 py-2 text-sm font-semibold text-white hover:bg-[#0f303a]">
                Save Changes
            </button>
        </div>
    </form>
</main>
</body>
</html>
