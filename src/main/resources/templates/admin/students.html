<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin-layout :: adminLayout(~{::title}, ~{::main})">
<head>
    <title>Students</title>
</head>
<body>
<main>
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Students</h1>
            <p class="mt-1 text-sm text-slate-600">Manage student records used when issuing certificates.</p>
        </div>
        <a th:href="@{/admin/students/new}"
           class="rounded-lg bg-[#164655] px-4 py-2 text-sm font-semibold text-white hover:bg-[#0f303a]">
            New Student
        </a>
    </div>

    <div class="mt-6 rounded-2xl border border-slate-200 bg-white overflow-x-auto">
        <div th:if="${#lists.isEmpty(students)}" class="p-8 text-center">
            <div class="text-lg font-semibold text-slate-900">No students yet</div>
            <div class="mt-1 text-sm text-slate-600">Create your first student to start issuing certificates.</div>
            <div class="mt-4">
                <a th:href="@{/admin/students/new}"
                   class="inline-flex rounded-lg bg-[#164655] px-4 py-2 text-sm font-semibold text-white hover:bg-[#0f303a]">
                    New Student
                </a>
            </div>
        </div>

        <table th:if="${!#lists.isEmpty(students)}" class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Student ID</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Full Name</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Email</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Status</th>
                <th class="px-6 py-3 text-right text-xs font-semibold text-slate-600 uppercase tracking-wider">Actions</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-100">
            <tr th:each="s : ${students}">
                <td class="px-6 py-4 font-mono text-sm text-slate-900" th:text="${s.studentNumber}"></td>
                <td class="px-6 py-4 text-sm text-slate-900" th:text="${s.fullName}"></td>
                <td class="px-6 py-4 text-sm text-slate-700" th:text="${s.email} ?: '—'"></td>
                <td class="px-6 py-4 text-sm">
                    <span th:text="${s.status}"
                          th:classappend="${s.status.name() == 'ACTIVE'} ? ' text-emerald-700' : ' text-red-600'">
                    </span>
                </td>
                <td class="px-6 py-4 text-right text-xs">
                    <form th:if="${s.status.name() == 'ACTIVE'}"
                          th:action="@{/admin/students/{id}/deactivate(id=${s.id})}" method="post" class="inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="inline-flex items-center rounded-lg border border-slate-300 bg-white px-3 py-1 font-semibold text-slate-700 hover:bg-slate-50">
                            Set inactive
                        </button>
                    </form>
                    <form th:if="${s.status.name() == 'INACTIVE'}"
                          th:action="@{/admin/students/{id}/activate(id=${s.id})}" method="post" class="inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="inline-flex items-center rounded-lg border border-[#164655] bg-white px-3 py-1 font-semibold text-[#164655] hover:bg-[#164655] hover:text-white">
                            Set active
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
