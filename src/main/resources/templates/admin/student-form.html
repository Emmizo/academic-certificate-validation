<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin-layout :: adminLayout(~{::title}, ~{::main})">
<head>
    <title th:text="${formTitle} + ' | CertSign Admin'">Student | CertSign Admin</title>
</head>
<body>
<main>
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900" th:text="${formTitle}">Create Student</h1>
            <p class="mt-1 text-sm text-slate-600" th:text="${formDescription}">
                Register a student once, then reuse them when issuing certificates.
            </p>
        </div>
        <a th:href="@{/admin/students}"
           class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">
            Back to Students
        </a>
    </div>

    <div class="mt-6 max-w-xl rounded-2xl border border-slate-200 bg-white p-6">
        <div class="mb-4" th:if="${error != null}">
            <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-800" th:text="${error}"></div>
        </div>

        <form th:action="${formAction}" th:object="${studentRequest}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-sm font-medium text-slate-700">Student ID / Number</label>
                <input th:field="*{studentNumber}" type="text" required
                       class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Full Name</label>
                <input th:field="*{fullName}" type="text" required
                       class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Email (optional)</label>
                <input th:field="*{email}" type="email"
                       class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">National ID (optional)</label>
                    <input th:field="*{nationalId}" type="text"
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Date of Birth (optional)</label>
                    <input th:field="*{dateOfBirth}" type="date"
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
                </div>
            </div>

            <button type="submit"
                    class="w-full rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                <span th:text="${submitLabel}">Save Student</span>
            </button>
        </form>
    </div>
</main>
</body>
</html>
