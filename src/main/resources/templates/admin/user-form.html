<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="admin-layout :: adminLayout(~{::title}, ~{::main})">
<head>
    <title>Create User | CertSign Admin</title>
</head>
<body>
<main>
    <section class="max-w-2xl space-y-6">
        <div>
            <h1 class="text-3xl font-semibold text-slate-900">Create User</h1>
            <p class="mt-1 text-sm text-slate-600">Create a user account and send credentials by email.</p>
        </div>

        <div th:if="${error}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700" th:text="${error}">
            Error
        </div>

        <form th:action="@{/admin/users}" method="post" class="space-y-4 rounded-xl border border-slate-200 bg-white p-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-sm font-medium text-slate-700">Username</label>
                <input name="username" type="text" required th:value="${username}"
                       class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Email</label>
                <input name="email" type="email" required th:value="${email}"
                       class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Role</label>
                <select name="role" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="">Select role</option>
                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}"
                            th:selected="${selectedRole != null and selectedRole == role}">
                        SIGNER
                    </option>
                </select>
            </div>

            <div class="flex items-center gap-3">
                <button type="submit" class="rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                    Create User
                </button>
                <a th:href="@{/admin/users}" class="text-sm text-slate-600 hover:underline">Back to users</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
