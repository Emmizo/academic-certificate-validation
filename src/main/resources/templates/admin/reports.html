<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin-layout :: adminLayout(~{::title}, ~{::main})}">
<head>
    <title>Reports | IPRC Tumba College Admin</title>
</head>
<body>
<main>
    <section class="space-y-6">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
            <div>
                <h1 class="text-3xl font-semibold text-slate-900">Reports</h1>
                <p class="mt-1 text-sm text-slate-600">Certificate generation totals by day or month.</p>
            </div>
            <a th:href="@{/admin/reports/pdf(mode=${mode},date=${date},month=${month})}"
               class="inline-flex items-center justify-center rounded-lg bg-[#164655] px-4 py-2 text-sm font-semibold text-white hover:bg-[#0f303a]">
                Generate PDF
            </a>
        </div>

        <form th:action="@{/admin/reports}" method="get"
              class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
                <div>
                    <label for="mode" class="block text-sm font-medium text-slate-700">Report type</label>
                    <select id="mode" name="mode"
                            class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]">
                        <option value="day" th:selected="${mode == 'day'}">Daily</option>
                        <option value="month" th:selected="${mode == 'month'}">Monthly</option>
                    </select>
                </div>
                <div>
                    <label for="date" class="block text-sm font-medium text-slate-700">Select Date</label>
                    <input id="date" name="date" type="date" th:value="${date}"
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655]"/>
                </div>
                <div class="flex items-end">
                    <button type="submit"
                            class="w-full rounded-lg bg-slate-900 px-4 py-2 font-semibold text-white hover:bg-black"
                            data-loading-text="Loading...">
                        View Report
                    </button>
                </div>
            </div>
        </form>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Generated</div>
                <div class="mt-2 text-3xl font-semibold text-slate-900" th:text="${report.total}">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Pending</div>
                <div class="mt-2 text-3xl font-semibold text-amber-700" th:text="${report.pending}">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Approved</div>
                <div class="mt-2 text-3xl font-semibold text-emerald-700" th:text="${report.approved}">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Rejected</div>
                <div class="mt-2 text-3xl font-semibold text-red-700" th:text="${report.rejected}">0</div>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div class="border-b border-slate-200 px-6 py-4">
                <h2 class="text-lg font-semibold text-slate-900" th:text="${report.period.label}">Monthly report</h2>
                <p class="mt-1 text-sm text-slate-500">
                    <span th:text="${report.period.startDate}">2026-01-01</span>
                    <span> to </span>
                    <span th:text="${report.period.endDate}">2026-01-31</span>
                </p>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-50/95 text-slate-600">
                    <tr>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Generated</th>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Certificate ID</th>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Student</th>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Program</th>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-[11px] font-semibold uppercase tracking-wider">Issue Date</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white">
                    <tr th:if="${#lists.isEmpty(report.certificates)}">
                        <td colspan="6" class="px-6 py-8 text-center text-sm text-slate-500">No certificates found for this period.</td>
                    </tr>
                    <tr th:each="certificate : ${report.certificates}" class="hover:bg-slate-50/70">
                        <td class="px-6 py-4 text-slate-700" th:text="${#temporals.format(certificate.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="px-6 py-4 font-semibold text-slate-900" th:text="${certificate.certificateId}"></td>
                        <td class="px-6 py-4 text-slate-700">
                            <div class="font-medium text-slate-900" th:text="${certificate.studentName}"></div>
                            <div class="text-xs text-slate-500" th:text="${certificate.studentId}"></div>
                        </td>
                        <td class="px-6 py-4 text-slate-700" th:text="${certificate.degree}"></td>
                        <td class="px-6 py-4">
                            <span th:text="${certificate.approvalStatus == null ? 'APPROVED' : #strings.replace(certificate.approvalStatus.name(), '_', ' ')}"
                                  th:classappend="${certificate.approvalStatus == null or certificate.approvalStatus.name() == 'APPROVED' ? ' border-emerald-200 bg-emerald-50 text-emerald-700' : (certificate.approvalStatus.name() == 'REJECTED' ? ' border-red-200 bg-red-50 text-red-700' : ' border-amber-200 bg-amber-50 text-amber-700')}"
                                  class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-semibold"></span>
                        </td>
                        <td class="px-6 py-4 text-slate-700" th:text="${#temporals.format(certificate.issueDate, 'yyyy-MM-dd')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>
</body>
</html>
