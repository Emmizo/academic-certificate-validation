<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{admin-layout :: adminLayout(~{::title}, ~{::main})}">
<head>
    <title>Programs</title>
</head>
<body>
<main>
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Programs</h1>
            <p class="mt-1 text-sm text-slate-600">Manage approved degree/program names for certificate issuance.</p>
        </div>
    </div>

    <div class="mt-4" th:if="${success}">
        <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800" th:text="${success}"></div>
    </div>
    <div class="mt-4" th:if="${error}">
        <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800" th:text="${error}"></div>
    </div>

    <div class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','SECRETARY')" class="lg:col-span-1 space-y-4">
            <div class="rounded-2xl border border-slate-200 bg-white p-6">
                <h2 class="text-lg font-semibold text-slate-900" th:text="${isEdit} ? 'Edit Program' : 'Add Program'">Add Program</h2>
                <form th:action="${isEdit} ? @{/admin/programs/{id}/edit(id=${editId})} : @{/admin/programs}" th:object="${programRequest}" method="post" class="mt-4 space-y-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Licence type</label>
                        <select th:field="*{licenceTypeId}"
                                class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-[#164655]">
                            <option value="">Select licence type (optional)</option>
                            <option th:each="licenceType : ${licenceTypes}" th:value="${licenceType.id}" th:text="${licenceType.name}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Program name</label>
                        <select th:field="*{name}" required
                                class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-[#164655]">
                            <option value="" disabled selected>Select program name...</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Electronic">Electronic</option>
                            <option value="IT">IT</option>
                            <option value="Energy">Energy</option>
                            <option value="Training program">Training program</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit"
                                class="flex-1 rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]"
                                th:text="${isEdit} ? 'Save Changes' : 'Save Program'">
                            Save Program
                        </button>
                        <a th:if="${isEdit}" th:href="@{/admin/programs}"
                           class="rounded-lg border border-slate-300 bg-white px-4 py-2 font-semibold text-slate-700 hover:bg-slate-50 text-center">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

	        <div th:classappend="${#authorization.expression('hasAnyRole(''SUPER_ADMIN'',''ADMIN'',''SECRETARY'')') ? 'lg:col-span-2' : 'lg:col-span-3'}"
	             class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50/95 backdrop-blur supports-[backdrop-filter]:bg-slate-50/80">
                <tr>
                    <th class="px-6 py-3 text-left text-[11px] font-semibold text-slate-600 uppercase tracking-wider">Program</th>
                    <th class="px-6 py-3 text-left text-[11px] font-semibold text-slate-600 uppercase tracking-wider">Licence Type</th>
                    <th class="px-6 py-3 text-left text-[11px] font-semibold text-slate-600 uppercase tracking-wider">Status</th>
	                    <th sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','SECRETARY')"
	                        class="px-6 py-3 text-right text-[11px] font-semibold text-slate-600 uppercase tracking-wider">Action</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                <tr th:if="${#lists.isEmpty(programs)}">
	                    <td th:attr="colspan=${#authorization.expression('hasAnyRole(''SUPER_ADMIN'',''ADMIN'',''SECRETARY'')') ? 4 : 3}"
	                        class="px-6 py-6 text-center text-sm text-slate-500">No programs yet.</td>
                </tr>
                <tr th:each="p : ${programs}" class="hover:bg-slate-50/70 transition-colors">
                    <td class="px-6 py-4 text-sm text-slate-900 font-semibold" th:text="${p.name}"></td>
                    <td class="px-6 py-4 text-sm text-slate-700"
                        th:text="${p.licenceType != null ? p.licenceType.name : '—'}"></td>
                    <td class="px-6 py-4 text-sm">
                        <span th:text="${p.active ? 'Active' : 'Inactive'}"
                              th:classappend="${p.active ? ' bg-emerald-50 text-emerald-700 border-emerald-200' : ' bg-red-50 text-red-700 border-red-200'}"
                              class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-semibold"></span>
                    </td>
	                    <td sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','SECRETARY')" class="px-6 py-4 text-right whitespace-nowrap">
                            <div class="inline-flex items-center gap-2">
                                <a th:href="@{/admin/programs(edit=${p.id})}"
                                   class="rounded-md border border-slate-300 bg-white px-2.5 py-1 text-xs font-semibold text-slate-700 hover:bg-slate-50">
                                    Edit
                                </a>
                                <form th:if="${p.active}" th:action="@{/admin/programs/{id}/deactivate(id=${p.id})}" method="post" class="inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="rounded-md border border-red-200 bg-white px-2.5 py-1 text-xs font-semibold text-red-700 hover:bg-red-50"
                                            data-loading-text="Deactivating...">
                                        Deactivate
                                    </button>
                                </form>
                                <form th:if="${!p.active}" th:action="@{/admin/programs/{id}/activate(id=${p.id})}" method="post" class="inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="rounded-md bg-emerald-600 px-2.5 py-1 text-xs font-semibold text-white hover:bg-emerald-700"
                                            data-loading-text="Activating...">
                                        Set active
                                    </button>
                                </form>
                                <form th:action="@{/admin/programs/{id}/delete(id=${p.id})}" method="post" class="inline"
                                      onsubmit="return confirm('Are you sure you want to delete this program permanently? This cannot be undone.');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="rounded-md bg-red-600 px-2.5 py-1 text-xs font-semibold text-white hover:bg-red-700"
                                            data-loading-text="Deleting...">
                                        Delete
                                    </button>
                                </form>
                            </div>
	                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>

</main>
</body>
</html>
