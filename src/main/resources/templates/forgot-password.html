<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::main})">
<head>
    <title>Forgot Password | CertSign</title>
</head>
<body>
<main class="min-h-[calc(100vh-4rem)] bg-[#164655] flex items-center justify-center">
    <div class="w-full max-w-xl px-4">
        <div class="bg-white border border-slate-200 rounded-2xl px-6 py-8 sm:px-10 shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-semibold text-slate-900">Forgot Password</h1>
            <p class="mt-1 text-sm text-slate-600">Enter your email to receive a password reset link.</p>

            <div class="mt-4" th:if="${param.sent}">
                <div class="rounded-lg border border-green-200 bg-green-50 p-3 text-sm text-green-800">
                    If the email exists, a reset link has been sent.
                </div>
            </div>

            <form class="mt-6 space-y-4" th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Email</label>
                    <input name="email" type="email" required
                           class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#164655] shadow-sm"/>
                </div>
                <button type="submit"
                        class="w-full rounded-lg bg-[#164655] px-4 py-2 font-semibold text-white hover:bg-[#0f303a]">
                    Send Reset Link
                </button>
            </form>

            <p class="mt-5 text-sm text-slate-600">
                <a th:href="@{/login}" class="text-[#164655] font-semibold hover:underline">Back to login</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
